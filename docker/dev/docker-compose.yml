name: goeasyadmin

services:
  mysql:
    image: mysql:8.0
    container_name: gbaseadmin_mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-40001}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gbaseadmin_net

  redis:
    image: redis:7-alpine
    container_name: gbaseadmin_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-40002}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gbaseadmin_net

  system:
    build:
      context: ../../admin-go
      dockerfile: ../docker/build/Dockerfile.system
    container_name: gbaseadmin_system
    restart: unless-stopped
    working_dir: /app
    command: ["/bin/sh", "/docker/dev/start-go-app.sh", "system"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8000
      - TZ=Asia/Shanghai
    ports:
      - "${SYSTEM_PORT:-40003}:8000"
    volumes:
      - ./start-go-app.sh:/docker/dev/start-go-app.sh:ro
    networks:
      - gbaseadmin_net

  upload:
    build:
      context: ../../admin-go
      dockerfile: ../docker/build/Dockerfile.upload
    container_name: gbaseadmin_upload
    restart: unless-stopped
    working_dir: /app
    command: ["/bin/sh", "/docker/dev/start-go-app.sh", "upload"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8002
      - TZ=Asia/Shanghai
    ports:
      - "${UPLOAD_PORT:-40004}:8002"
    volumes:
      - ./start-go-app.sh:/docker/dev/start-go-app.sh:ro
    networks:
      - gbaseadmin_net

  frontend:
    image: node:22-alpine
    container_name: gbaseadmin_frontend
    restart: unless-stopped
    working_dir: /app
    command: ["/bin/sh", "/docker/dev/docker-web-start.sh"]
    volumes:
      - ../../vue-vben-admin:/app
      - frontend_node_modules:/app/node_modules
      - ./docker-web-start.sh:/docker/dev/docker-web-start.sh:ro
    ports:
      - "${FRONTEND_PORT:-40005}:5666"
    environment:
      - VITE_GLOB_API_URL=${VITE_GLOB_API_URL:-http://localhost:40003}
      - NODE_OPTIONS=--max-old-space-size=4096
    networks:
      - gbaseadmin_net

  adminer:
    image: adminer:latest
    container_name: gbaseadmin_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-40006}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    depends_on:
      - mysql
    networks:
      - gbaseadmin_net

  gotools:
    image: golang:1.25-alpine
    container_name: gbaseadmin_gotools
    profiles:
      - tools
    working_dir: /workspace
    volumes:
      - ../../admin-go:/workspace
      - go_pkg_cache:/root/go/pkg
    environment:
      - GOPROXY=https://goproxy.cn,direct
      - GOPATH=/root/go
      - CGO_ENABLED=0
    command: sh -c "apk add --no-cache git curl && tail -f /dev/null"
    networks:
      - gbaseadmin_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local
  go_pkg_cache:
    driver: local

networks:
  gbaseadmin_net:
    driver: bridge
