# ─────────────────────────────────────────────────────────────
# GBaseAdmin Nginx 配置（生产环境）
# 职责：
#   1. 服务前端静态文件（Vue SPA）
#   2. /api 路径反向代理到 GoFrame 后端（system:8000）
#   3. 处理 Vue Router history 模式（所有非 /api 请求返回 index.html）
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础性能配置
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip 压缩（减小传输体积）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ─────────────────────────────────────────────
    # 上游：GoFrame 后端服务
    # ─────────────────────────────────────────────
    upstream system_backend {
        server system:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # 客户端请求体大小限制（文件上传场景）
        client_max_body_size 50m;

        # ─────────────────────────────────────────────
        # /api 路径：反向代理到 GoFrame 后端
        # ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://system_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # 禁用缓存（API 请求不缓存）
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # ─────────────────────────────────────────────
        # 静态资源：带版本 hash 的文件永久缓存
        # Vite 构建产物（/assets/xxx.[hash].js）
        # ─────────────────────────────────────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # favicon 和其他静态资源
        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ─────────────────────────────────────────────
        # Vue Router history 模式支持
        # 所有未匹配的路径返回 index.html
        # ─────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # index.html 不缓存（确保新版本立即生效）
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }

        # ─────────────────────────────────────────────
        # 安全 Header
        # ─────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 隐藏 Nginx 版本（已通过 server_tokens off 处理）
        # 错误页
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
