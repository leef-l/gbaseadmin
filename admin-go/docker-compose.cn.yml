version: '3.8'

# ═════════════════════════════════════════════════════════════
# GBaseAdmin Docker Compose - 国内版（使用国内镜像加速）
# 使用方法：docker compose -f docker-compose.cn.yml up -d
# 镜像使用 docker.1ms.run 加速代理，无需配置 daemon.json
# ═════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────
  # MySQL 8.0 - 主数据库
  # ─────────────────────────────────────────────
  mysql:
    image: docker.1ms.run/mysql:8.0
    container_name: gbaseadmin_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # Redis 7 - 缓存 / JWT Token 黑名单
  # ─────────────────────────────────────────────
  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: gbaseadmin_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # system - GoFrame 权限服务（后端）
  # ─────────────────────────────────────────────
  system:
    build:
      context: .
      dockerfile: deploy/Dockerfile.system.cn
    container_name: gbaseadmin_system
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GF_GCFG_FILE=manifest/config/config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8000
      - TZ=Asia/Shanghai
    ports:
      - "${SYSTEM_PORT:-9000}:8000"
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # frontend - Vben Admin（开发模式）
  # ─────────────────────────────────────────────
  frontend:
    image: docker.1ms.run/node:22-alpine
    container_name: gbaseadmin_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "apk add --no-cache git && npm install -g pnpm --registry=https://registry.npmmirror.com && pnpm config set registry https://registry.npmmirror.com && pnpm install --ignore-scripts && pnpm dev:antd --host 0.0.0.0"
    volumes:
      - ../vue-vben-admin:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5555}:5555"
    environment:
      - VITE_GLOB_API_URL=${VITE_GLOB_API_URL:-http://localhost:8000}
      - NODE_OPTIONS=--max-old-space-size=4096
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # adminer - 数据库管理 Web UI（仅开发环境）
  # ─────────────────────────────────────────────
  adminer:
    image: docker.1ms.run/adminer:latest
    container_name: gbaseadmin_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    depends_on:
      - mysql
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # gotools - Go 工具容器（不常驻，按需运行）
  # 用于在容器内执行 gf init / go build / gf gen 等命令
  # 使用 profile: tools，不随 docker-compose up 自动启动
  # ─────────────────────────────────────────────
  gotools:
    image: docker.1ms.run/golang:1.23-alpine
    container_name: gbaseadmin_gotools
    profiles:
      - tools
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go_pkg_cache:/root/go/pkg
    environment:
      - GOPROXY=https://goproxy.cn,direct
      - GOPATH=/root/go
      - CGO_ENABLED=0
    networks:
      - gbaseadmin_net
    # 默认保持容器存活，方便 exec 进入执行命令
    command: sh -c "apk add --no-cache git curl && tail -f /dev/null"

# ─────────────────────────────────────────────
# 数据卷
# ─────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local
  go_pkg_cache:
    driver: local

# ─────────────────────────────────────────────
# 网络
# ─────────────────────────────────────────────
networks:
  gbaseadmin_net:
    driver: bridge
