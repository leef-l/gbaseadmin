
# CLI tool, only in development environment.
# https://goframe.org/docs/cli
# https://goframe.org/docs/components/nosql-redis-config
redis:
  default:
    address: "127.0.0.1:6379"
    pass: "gbaseadmin123"
    db: 1

gfcli:
  run:
    path: "main.go"
    extra: ""
    watchPaths:
      - "internal"
      - "api"

  gen:
    dao:
      - link: "mysql:root:gbaseadmin123@tcp(127.0.0.1:3306)/gbaseadmin?charset=utf8mb4"
        tables: "play_member_level,play_member,play_coach_level,play_coach_apply,play_coach,play_shop,play_category,play_goods,play_order,play_payment,play_recharge_plan,play_recharge_order,play_balance_log,play_activity,play_activity_reward,play_activity_step,play_activity_join,play_coupon,play_coupon_member,play_oauth,play_review,play_profit_log"
        descriptionTag: true
        noJsonTag: true
        noModelComment: false
        overwriteDao: false

  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - my.image.pub/my-app