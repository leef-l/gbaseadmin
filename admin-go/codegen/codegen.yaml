# 数据库连接
database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: "gbaseadmin123"
  dbname: gbaseadmin

# 后端输出配置
backend:
  output: ../app/   # 输出根目录（应用目录由表名前缀决定）

# 前端输出配置
frontend:
  output: ../../vue-vben-admin/apps/web-antd/src/  # 输出根目录

# 跳过生成的公共字段（这些字段在表单中隐藏，不生成前端组件）
skip_fields:
  - created_at
  - updated_at
  - deleted_at
  - created_by
  - dept_id

# 菜单应用目录配置（新增应用时在此添加，无需修改生成器源码）
menu_apps:
  system:
    title: 系统管理
    icon: SettingOutlined
  upload:
    title: 上传管理
    icon: CloudUploadOutlined
  play:
    title: 陪玩管理
    icon: "game-icons:joystick"
