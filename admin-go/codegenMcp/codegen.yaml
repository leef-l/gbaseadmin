# codegenMcp 配置文件
# 数据库连接
database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: ""
  dbname: gbaseadmin

# 后端输出目录
backend:
  output: ../app/

# 前端输出目录
frontend:
  output: ../../vue-vben-admin/apps/web-antd/src/

# 操作日志
operation_log: false

# 后置生成行为（MCP模式默认均禁用外部命令）
post_generation:
  run_gf_init: false
  run_gf_gen_dao: false

# 跳过的公共字段
skip_fields:
  - created_at
  - updated_at
  - deleted_at
  - created_by
  - dept_id

# 菜单应用配置
menu_apps:
  system:
    title: 系统管理
    icon: ant-design:setting-outlined
    sort: 50
