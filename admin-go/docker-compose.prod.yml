version: '3.8'

# ─────────────────────────────────────────────
# 生产环境配置
# 与开发环境的主要区别：
#   1. 无 adminer（减少攻击面）
#   2. 无 gotools（不需要开发工具）
#   3. frontend 改为 nginx 静态文件服务（需先构建 dist）
#   4. system 服务不挂载源码（使用镜像内编译产物）
#   5. 所有服务不暴露不必要的端口到外网
# ─────────────────────────────────────────────

services:
  # ─────────────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: gbaseadmin_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # 生产环境不对外暴露 3306，只在内网访问
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gbaseadmin_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # system - GoFrame 权限服务（后端）
  # ─────────────────────────────────────────────
  system:
    build:
      context: .
      dockerfile: deploy/Dockerfile.system
    container_name: gbaseadmin_system
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8000
      - GF_LOGGER_LEVEL=info
      - TZ=Asia/Shanghai
    # 生产环境不直接对外暴露后端端口，通过 nginx 转发
    expose:
      - "8000"
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # frontend - Nginx 静态文件服务（生产模式）
  # 需要先在宿主机执行: cd vue-vben-admin && pnpm build:antd
  # 生成的 dist 目录会被 nginx 服务
  # ─────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: gbaseadmin_frontend
    restart: always
    volumes:
      - ./vue-vben-admin/apps/web-antd/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - system
    networks:
      - gbaseadmin_net

# ─────────────────────────────────────────────
# 数据卷
# ─────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────
# 网络
# ─────────────────────────────────────────────
networks:
  gbaseadmin_net:
    driver: bridge
