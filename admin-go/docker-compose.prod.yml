# ─────────────────────────────────────────────
# 生产环境配置（宝塔 Nginx + Docker）
# 只跑 mysql/redis/system/play，前端由宝塔 Nginx 托管静态文件
# 端口绑定 127.0.0.1，宝塔 Nginx 反向代理
# ─────────────────────────────────────────────

services:
  # ─────────────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: gbaseadmin_mysql
    restart: always
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --max-connections=500
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gbaseadmin_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # system - GoFrame 权限服务（后端）
  # ─────────────────────────────────────────────
  system:
    build:
      context: .
      dockerfile: deploy/Dockerfile.system
    container_name: gbaseadmin_system
    restart: always
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8000
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:${SYSTEM_PORT:-8000}:8000"
    networks:
      - gbaseadmin_net

  # ─────────────────────────────────────────────
  # play - 陪玩服务（后端）
  # ─────────────────────────────────────────────
  play:
    build:
      context: .
      dockerfile: deploy/Dockerfile.play
    container_name: gbaseadmin_play
    restart: always
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8001
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:${PLAY_PORT:-8001}:8001"
    networks:
      - gbaseadmin_net

# ─────────────────────────────────────────────
# 数据卷
# ─────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────
# 网络
# ─────────────────────────────────────────────
networks:
  gbaseadmin_net:
    driver: bridge
